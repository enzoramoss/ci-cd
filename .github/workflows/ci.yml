name: CI

on:
  pull_request:
    branches:
      - develop

env:
  PORT: ${{ vars.PORT }}
  API_TOKEN: ${{ secrets.API_TOKEN }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout no código
        uses: actions/checkout@v4

      - name: Instalar o Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instala dependências
        run: npm install

      - name: Roda os testes
        run: npm test

  build:
   runs-on: ubuntu-latest
   needs: test
   steps:
      - name: Checkout no código
        uses: actions/checkout@v4

      - name: Instalar o Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instala dependências
        run: npm install

      - name: Roda os build
        run: npm run build